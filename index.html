<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genie Q2 Plan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #fff; color: #1a1a2e; overflow: hidden; height: 100vh; width: 100vw;
  }

  .slide {
    position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
    display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
    padding-top: 8vh; padding-bottom: 80px; opacity: 0; pointer-events: none;
    transition: opacity 0.5s ease; overflow-y: auto;
  }
  .slide.active { opacity: 1; pointer-events: all; }
  .slide.title-centered { justify-content: center; padding-top: 0; }

  .bg-gradient-top {
    position: absolute; top: 0; left: 0; right: 0; height: 200px;
    background: linear-gradient(120deg, rgba(255,116,81,0.08) 0%, rgba(219,94,198,0.06) 50%, rgba(140,101,255,0.08) 100%);
    filter: blur(40px); z-index: 0;
  }

  .slide-content { position: relative; z-index: 1; text-align: center; max-width: 1100px; width: 90%; }
  .genie-icon { width: 64px; height: 64px; margin-bottom: 24px; }
  .title-slide h1 { font-size: 56px; font-weight: 800; letter-spacing: -1.5px; line-height: 1.15; margin-bottom: 16px; }
  .title-slide .subtitle { font-size: 18px; color: #888; font-weight: 400; }

  .section-label {
    display: inline-block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 2.5px;
    background: linear-gradient(135deg, #FF7451, #DB5EC6, #8C65FF);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    padding: 8px 20px; border-radius: 24px; margin-bottom: 20px;
    border: 1.5px solid rgba(140,101,255,0.2);
  }

  .content-slide h2 { font-size: 40px; font-weight: 800; letter-spacing: -1px; margin-bottom: 40px; }
  .items-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; text-align: left; max-width: 960px; margin: 0 auto; }
  .items-grid.single-col { grid-template-columns: 1fr; max-width: 700px; }

  .item-card {
    background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
    border: 1px solid rgba(200,190,230,0.3); border-radius: 14px;
    padding: 20px 24px; transition: transform 0.2s ease, box-shadow 0.2s ease; position: relative;
  }
  .item-card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(140,120,255,0.1); }

  .score-badge {
    position: absolute; top: 10px; right: 12px; width: 26px; height: 26px; border-radius: 8px;
    background: rgba(140,101,255,0.08); color: #8C65FF; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; cursor: default;
  }
  .score-tooltip {
    display: none; position: absolute; top: -8px; right: 42px;
    background: #1a1a2e; color: #fff; font-size: 11px; font-weight: 400;
    padding: 10px 14px; border-radius: 10px; white-space: nowrap; z-index: 10;
    line-height: 1.6; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .score-tooltip::after { content: ''; position: absolute; top: 14px; right: -5px; width: 10px; height: 10px; background: #1a1a2e; transform: rotate(45deg); }
  .score-badge:hover + .score-tooltip, .score-tooltip:hover { display: block; }

  .item-name {
    font-size: 15px; font-weight: 700; margin-bottom: 4px;
    background: linear-gradient(135deg, #FF7451, #DB5EC6, #8C65FF);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .item-desc { font-size: 13px; color: #666; line-height: 1.45; font-weight: 400; }

  .nav {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 12px; z-index: 100;
    background: rgba(255,255,255,0.85); backdrop-filter: blur(12px);
    padding: 8px 20px; border-radius: 40px;
    border: 1px solid rgba(200,190,230,0.3); box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  .nav-btn {
    width: 36px; height: 36px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #FF7451, #DB5EC6, #8C65FF);
    color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s;
  }
  .nav-btn:hover { opacity: 0.85; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  .nav-dots { display: flex; gap: 6px; }
  .nav-dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; transition: all 0.3s ease; cursor: pointer; border: none; }
  .nav-dot.active { background: linear-gradient(135deg, #FF7451, #8C65FF); width: 24px; border-radius: 4px; }
  .slide-counter { font-size: 12px; color: #aaa; font-weight: 500; min-width: 40px; text-align: center; }
</style>
</head>
<body>
<div id="slides-container"></div>

<div class="nav">
  <button class="nav-btn" id="prev-btn" onclick="changeSlide(-1)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <div class="nav-dots" id="nav-dots"></div>
  <span class="slide-counter" id="slide-counter"></span>
  <button class="nav-btn" id="next-btn" onclick="changeSlide(1)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>

<script>
const EL = { 1:'High', 2:'Mid', 3:'Mid', 4:'Mid', 5:'Low' };
const IL = { 1:'Low', 2:'Low', 3:'Mid', 4:'High', 5:'High' };

const ICON = `<svg class="genie-icon" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M199.937 37.627C206.837 37.627 212.432 43.2212 212.432 50.1221C212.432 57.0229 206.837 62.6172 199.937 62.6172C124.027 62.6172 62.4902 124.154 62.4902 200.063C62.4902 234.278 74.9683 265.552 95.6479 289.612C99.3538 293.924 99.6814 300.182 96.4451 304.857L73.8302 337.51H199.937C275.846 337.51 337.383 275.973 337.383 200.063C337.383 193.163 342.977 187.568 349.878 187.568C356.779 187.568 362.373 193.163 362.373 200.063C362.373 289.775 289.648 362.5 199.937 362.5H49.9951C45.3474 362.5 41.0886 359.914 38.9317 355.797C36.7767 351.681 37.0837 346.715 39.7289 342.895L70.5925 298.3C49.845 271.02 37.5 236.976 37.5 200.063C37.5 110.352 110.225 37.627 199.937 37.627Z" fill="url(#p0)"/><path d="M252.357 213.616C254.078 206.939 260.891 202.907 267.57 204.619C274.249 206.338 278.279 213.152 276.567 219.831C267.783 253.96 236.811 279.199 199.92 279.199C163.031 279.197 132.058 253.959 123.274 219.831C121.562 213.153 125.594 206.339 132.271 204.619C138.95 202.904 145.761 206.939 147.483 213.616C153.497 236.967 174.712 254.207 199.92 254.209C225.13 254.209 246.344 236.968 252.357 213.616Z" fill="url(#p1)"/><path fill-rule="evenodd" clip-rule="evenodd" d="M299.897 29.2969C305.664 29.2969 310.675 33.2441 312.035 38.8472C314.915 50.7547 321.025 61.65 329.687 70.3127C338.35 78.9755 349.245 85.0849 361.153 87.9654C366.756 89.3248 370.703 94.3362 370.703 100.103C370.703 105.869 366.756 110.88 361.153 112.24C349.245 115.12 338.35 121.23 329.687 129.892C321.025 138.555 314.915 149.45 312.035 161.358C310.675 166.961 305.664 170.908 299.897 170.908C294.131 170.908 289.12 166.961 287.76 161.358C284.88 149.45 278.77 138.555 270.108 129.892C261.445 121.23 250.55 115.12 238.642 112.24C233.039 110.88 229.092 105.869 229.092 100.103C229.092 94.3362 233.039 89.3248 238.642 87.9654C250.55 85.0849 261.445 78.9755 270.108 70.3127C278.77 61.65 284.88 50.7547 287.76 38.8472L288.427 36.8297C290.376 32.3189 294.851 29.2969 299.897 29.2969ZM299.897 72.9322C296.405 78.3327 292.365 83.3932 287.777 87.9816C283.188 92.5701 278.128 96.6097 272.727 100.103C278.128 103.595 283.188 107.635 287.777 112.223C292.362 116.809 296.406 121.86 299.897 127.257C303.389 121.86 307.433 116.809 312.018 112.223C316.604 107.638 321.655 103.594 327.052 100.103C321.655 96.6114 316.604 92.5668 312.018 87.9816C307.43 83.3932 303.39 78.3327 299.897 72.9322Z" fill="url(#p2)"/><defs><linearGradient id="p0" x1="37.5" y1="365" x2="84.45" y2="-6.41" gradientUnits="userSpaceOnUse"><stop stop-color="#FF7451"/><stop offset=".5" stop-color="#DB5EC6"/><stop offset="1" stop-color="#8C65FF"/></linearGradient><linearGradient id="p1" x1="37.5" y1="365" x2="84.45" y2="-6.41" gradientUnits="userSpaceOnUse"><stop stop-color="#FF7451"/><stop offset=".5" stop-color="#DB5EC6"/><stop offset="1" stop-color="#8C65FF"/></linearGradient><linearGradient id="p2" x1="37.5" y1="365" x2="84.45" y2="-6.41" gradientUnits="userSpaceOnUse"><stop stop-color="#FF7451"/><stop offset=".5" stop-color="#DB5EC6"/><stop offset="1" stop-color="#8C65FF"/></linearGradient></defs></svg>`;

function render(data) {
  const c = document.getElementById('slides-container');
  let h = `<div class="slide active title-centered" id="slide-0"><div class="bg-gradient-top"></div><div class="slide-content title-slide">${ICON}<h1>${data.title}</h1><p class="subtitle">${data.subtitle}</p></div></div>`;
  data.groups.forEach((g, i) => {
    const items = [...g.items].sort((a, b) => (b.effort+b.impact) - (a.effort+a.impact));
    const cls = items.length <= 4 ? ' single-col' : '';
    h += `<div class="slide" id="slide-${i+1}"><div class="bg-gradient-top"></div><div class="slide-content content-slide"><span class="section-label">${g.label}</span><h2>${g.heading}</h2><div class="items-grid${cls}" data-group="${g.id}">${items.map(it => {
      const s = it.effort + it.impact;
      return `<div class="item-card"><div class="score-badge">${s}</div><div class="score-tooltip">Effort: ${it.effort}/5 (${EL[it.effort]}) &middot; Impact: ${it.impact}/5 (${IL[it.impact]})<br>Score = Effort + Impact</div><div class="item-name">${it.name}</div><div class="item-desc">${it.desc}</div></div>`;
    }).join('')}</div></div></div>`;
  });
  c.innerHTML = h;
}

let totalSlides = 0, current = 0;
function initNav() {
  totalSlides = document.querySelectorAll('.slide').length;
  const d = document.getElementById('nav-dots'); d.innerHTML = '';
  for (let i = 0; i < totalSlides; i++) { const b = document.createElement('button'); b.className = 'nav-dot'+(i===0?' active':''); b.onclick = () => goToSlide(i); d.appendChild(b); }
  updateNav();
}
function goToSlide(n) { document.getElementById('slide-'+current).classList.remove('active'); current = n; document.getElementById('slide-'+current).classList.add('active'); updateNav(); }
function changeSlide(dir) { const n = current+dir; if (n >= 0 && n < totalSlides) goToSlide(n); }
function updateNav() {
  document.getElementById('prev-btn').disabled = current === 0;
  document.getElementById('next-btn').disabled = current === totalSlides - 1;
  document.getElementById('slide-counter').textContent = (current+1)+' / '+totalSlides;
  document.querySelectorAll('.nav-dot').forEach((d,i) => d.className = 'nav-dot'+(i===current?' active':''));
}
document.addEventListener('keydown', e => { if (e.key==='ArrowRight'||e.key==='ArrowDown') changeSlide(1); if (e.key==='ArrowLeft'||e.key==='ArrowUp') changeSlide(-1); });

fetch('data.json?'+Date.now()).then(r=>r.json()).then(data => { render(data); initNav(); });
</script>
</body>
</html>
